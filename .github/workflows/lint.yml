name: lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: shellcheck install.sh lib/ui.sh bin/mikocode
      - name: bash syntax check
        run: |
          bash -n install.sh
          bash -n lib/ui.sh
          bash -n bin/mikocode
