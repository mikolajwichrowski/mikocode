# Keep mouse support always on
set -g mouse on
set -g focus-events on

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:Tc"
set -g set-clipboard on

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# MikoCode settings in a centered popup (theme, editor, AI tool, layout, ...)
bind S display-popup -E -w 76 -h 26 -T " MikoCode Settings " "mikocode --settings"
bind c new-window -c "#{pane_current_path}"
bind x confirm-before -p "Close workspace #W? (y/n)" kill-window
bind-key -n C-t new-window -c "#{pane_current_path}"
set -g renumber-windows on
set -g automatic-rename off
set -g base-index 1
setw -g pane-base-index 1

# Jump straight to workspace N (terminal must send Option/Alt as Meta)
bind -n M-1 select-window -t :=1
bind -n M-2 select-window -t :=2
bind -n M-3 select-window -t :=3
bind -n M-4 select-window -t :=4
bind -n M-5 select-window -t :=5
bind -n M-6 select-window -t :=6
bind -n M-7 select-window -t :=7
bind -n M-8 select-window -t :=8
bind -n M-9 select-window -t :=9

setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -sg escape-time 10
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=colour99

set -g status on
set -g status-position bottom
set -g status-style bg=default
set -g window-status-format " #[fg=colour250]#W#{?window_end_flag, #[fg=colour99,bold]+,} "
set -g window-status-current-format " #[bg=colour99,fg=white,bold] #W #[default]#{?window_end_flag,#[fg=colour99,bold]+#[default],} "
set -g status-left "#[fg=colour99,bold] MikoCode #[fg=colour240]│ "
set -g status-right "#[fg=colour245]%H:%M "

# User theme overrides generated by `mikocode --settings` (Ctrl-a S).
# Must stay last so it wins over the defaults above.
source-file -q ~/.config/mikocode/theme.tmux.conf
